[core]
# The home folder for airflow, default is ~/airflow
airflow_home = /opt/airflow

# The folder where your airflow configuration is located
config_file_path = /opt/airflow/airflow.cfg

# The folder where airflow should store its log files
base_log_folder = /opt/airflow/logs

# Airflow can store logs remotely in AWS S3, Google Cloud Storage or Elastic Search.
remote_logging = False

# The executor class that airflow should use. Choices include
# SequentialExecutor, LocalExecutor, CeleryExecutor, DaskExecutor, KubernetesExecutor, CeleryKubernetesExecutor
executor = CeleryExecutor

# Enable XCom pickling (set to False for security in 3.0.0)
enable_xcom_pickling = False

# Default task retries
default_task_retries = 1

# The SqlAlchemy connection string to the metadata database.
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow123@postgres:5432/airflow

# The amount of parallelism as a setting to the executor. This defines
# the max number of task instances that should run simultaneously on this airflow installation
parallelism = 32

# The number of task instances allowed to run concurrently by the scheduler in one DAG
dag_concurrency = 16

# Are DAGs paused by default at creation
dags_are_paused_at_creation = True

# The maximum number of active DAG runs per DAG
max_active_runs_per_dag = 16

# Whether to load the DAG examples that ship with Airflow. It's good to
# get started, but you probably want to set this to False in a production environment
load_examples = False

# Where your Airflow plugins are stored
plugins_folder = /opt/airflow/plugins

# The amount of time (in secs) to wait before timing out a python file import while filling the DagBag.
dagbag_import_timeout = 30

# The class to use for running task instances in a subprocess
task_runner = StandardTaskRunner

# If set, tasks without a `run_as_user` argument will be run with this user
default_impersonation = 

# Secret key to save connection passwords in the db
fernet_key = ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=

# Whether to disable pickling dags
donot_pickle = True

# How long before timing out a python file import while filling the DagBag
dagbag_import_timeout = 30

# Should the task log files be stored locally or remotely
store_serialized_dags = True

# Maximum number of serialized DAGs to store in DB
max_serialized_dags = 1000

[database]
# The SqlAlchemy connection string to the metadata database.
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow123@postgres:5432/airflow

# The encoding for the databases
sql_alchemy_encoding = utf-8

# The SqlAlchemy pool size is the maximum number of database connections in the pool.
sql_alchemy_pool_size = 5

# The maximum overflow size of the pool.
sql_alchemy_max_overflow = 10

# The SqlAlchemy pool recycle is the number of seconds a connection
# can be idle in the pool before it is invalidated.
sql_alchemy_pool_recycle = 1800

# Check connection at the start of each connection pool checkout.
sql_alchemy_pool_pre_ping = True

[webserver]
# The base url of your website as airflow cannot guess what domain or
# cname you are using. This is used in automated emails that
# airflow sends to point links to the right web server
base_url = http://localhost:8080

# Default timezone to display all dates in the UI, can be UTC, system, or
# any IANA timezone string (e.g. Europe/Amsterdam). If left empty the
# default value of core/default_timezone will be used
default_ui_timezone = UTC

# The port on which to run the web server
web_server_port = 8080

# Paths to the SSL certificate and key for the web server. When both are
# provided SSL will be enabled. This does not change the web server port.
web_server_ssl_cert = 
web_server_ssl_key = 

# Number of seconds the webserver waits before killing gunicorn master that doesn't respond
web_server_master_timeout = 120

# Number of seconds the gunicorn webserver waits before timing out on a worker
web_server_worker_timeout = 120

# Number of workers to refresh at a time. When set to 0, worker refresh is
# disabled. When nonzero, airflow periodically refreshes webserver workers by
# bringing up new ones and killing old ones.
worker_refresh_batch_size = 1

# Number of seconds to wait before refreshing a batch of workers.
worker_refresh_interval = 30

# If set to True, Airflow will track files in plugins_folder directory. When it detects changes,
# it will restart the gunicorn webserver
reload_on_plugin_change = False

# Expose the configuration file in the web server
expose_config = True

# Default DAG view. Valid values are: tree, graph, duration, gantt, landing_times
dag_default_view = tree

# Default DAG orientation. Valid values are: LR (Left->Right), TB (Top->Bottom), RL (Right->Left), BT (Bottom->Top)
dag_orientation = LR

# The amount of time (in secs) webserver will wait for initial handshake while fetching logs from other worker machine
log_fetch_timeout_sec = 5

# Time interval (in secs) to wait before next log fetching.
log_fetch_delay_sec = 2

# Distance away from page bottom to enable auto tailing.
log_auto_tailing_offset = 30

# Animation speed for auto tailing log display.
log_animation_speed = 1000

# Secret key used to run your flask app
secret_key = temporary_key

# In what format should the datetime be displayed in the UI
datetime_format = %Y-%m-%d %H:%M:%S

# Enable/disable Swagger UI for REST API
enable_swagger_ui = True

[email]
email_backend = airflow.utils.email.send_email_smtp

[smtp]
# If you want airflow to send emails on retries, failure, and you want to use
# the airflow.utils.email.send_email_smtp function, you have to configure an
# smtp server here
smtp_host = localhost
smtp_starttls = True
smtp_ssl = False
smtp_user = 
smtp_password = 
smtp_port = 587
smtp_mail_from = airflow@example.com

[celery]
# This section only applies if you are using the CeleryExecutor in
# [core] section above

# The app name that will be used by celery
celery_app_name = airflow.executors.celery_executor

# The concurrency that will be used when starting workers with the
# "airflow celery worker" command. This defines the number of task instances that
# a worker will take, so size up your workers based on the resources on
# your worker box and the nature of your tasks
worker_concurrency = 16

# The Celery broker URL. Celery supports RabbitMQ, Redis and experimentally
# a sqlalchemy database. Refer to the Celery documentation for more information.
broker_url = redis://:redis123@redis:6379/0

# The Celery result_backend. When a job finishes, it needs to update the
# metadata of the job. Therefore it will post a message on a message bus,
# or insert it into a database (depending of the backend)
result_backend = db+postgresql://airflow:airflow123@postgres:5432/airflow

# Celery Flower is a sweet UI for Celery. Airflow has a shortcut to start
# it `airflow celery flower`. This defines the IP that Celery Flower runs on
flower_host = 0.0.0.0

# The root URL for Flower
flower_url_prefix = 

# This defines the port that Celery Flower runs on
flower_port = 5555

# Securing Flower
flower_basic_auth = 

# Default queue that tasks get assigned to and that worker listen on.
default_queue = default

# How many processes CeleryExecutor uses to sync task state.
sync_parallelism = 1

# Import path for celery configuration options
celery_config_options = airflow.config_templates.default_celery.DEFAULT_CELERY_CONFIG

[celery_kubernetes_executor]
kubernetes_queue = kubernetes

[dask]
# This section only applies if you are using the DaskExecutor in
# [core] section above

# The IP address and port of the Dask cluster's scheduler.
cluster_address = 127.0.0.1:8786

# TLS/ SSL settings to access a secured Dask scheduler.
tls_ca = 
tls_cert = 
tls_key = 

[scheduler]
# Task instances listen for external kill signal (when you `airflow tasks kill` them),
# this defines the frequency at which they should listen (in seconds).
job_heartbeat_sec = 5

# The scheduler constantly tries to trigger new tasks (look at the
# scheduler section in the docs for more information). This defines
# how often the scheduler should run (in seconds).
scheduler_heartbeat_sec = 5

# Number of seconds after which a DAG file is parsed. The DAG file is parsed every
# `min_file_process_interval` number of seconds. Updates to DAGs are reflected after
# this interval. Keeping this a low value will increase CPU usage.
min_file_process_interval = 0

# How often (in seconds) to scan the DAGs directory for new files. Default to 5 minutes.
dag_dir_list_interval = 300

# How often should stats be printed to the logs
print_stats_interval = 30

# If the last scheduler heartbeat happened more than scheduler_health_check_threshold
# ago (in seconds), scheduler is considered unhealthy.
scheduler_health_check_threshold = 30

# Enable scheduler health check server
enable_health_check = True

# Turn off scheduler catchup by setting this to False.
catchup_by_default = True

# How often to check whether the Scheduler's DAG processing interval has passed
processing_interval = 1

# The number of times to try to schedule each DAG file
max_dagruns_to_create_per_loop = 10

# The number of DAG that the scheduler should process in batch
dags_dir_refresh_frequency = 3600

# How many DagRuns should a scheduler examine (and lock) when scheduling and queuing tasks.
max_dagruns_per_loop_to_schedule = 20

# Whether to run the scheduler in standalone mode
standalone_dag_processor = True

[triggerer]
# Time in seconds to check on the status of triggers 
default_capacity = 1000

[api]
# Comma separated list of auth backends to use
auth_backends = airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session

# Used to set the maximum page limit for API responses
maximum_page_limit = 100

# Used to set the default page limit when limit is zero, or not the query parameter
fallback_page_limit = 100

[lineage]
# what lineage backend to use
backend = 

[atlas]
sasl_enabled = False
host = 
port = 21000
username = 
password = 

[operators]
# The default owner assigned to each new operator, unless provided explicitly or passed via `default_args`
default_owner = airflow
default_cpus = 1
default_ram = 512
default_disk = 512
default_gpus = 0

[hive]
# Default mapreduce queue for HiveOperator tasks
default_hive_mapred_queue = 

[webserver]
# Set to true to turn on authentication:
# https://airflow.apache.org/docs/apache-airflow/stable/security/webserver.html
authenticate = False

# Filter the list of dags by owner name (requires authentication to be enabled)
filter_by_owner = False

# Web server master timeout
web_server_master_timeout = 120

# Web server worker timeout
web_server_worker_timeout = 120

[api_server]
# Airflow 3.0.0 API Server configuration
port = 8081
host = 0.0.0.0
auth_backends = airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session

[api]
# API configuration
auth_backends = airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
enable_experimental_api = True

